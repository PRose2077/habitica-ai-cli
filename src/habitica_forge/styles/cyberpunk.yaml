# 赛博朋克风格配置
# V2 世界观词典系统

name: cyberpunk
display_name: 赛博朋克
description: 霓虹灯、数据流、神经网络等科技感元素

# ============================================
# 世界观词典 (Lexicon)
# ============================================

lexicon:
  # 任务动词词典 - 按原型分类
  verbs:
    cleanup: ["擦除", "清理", "删除", "格式化", "清洗", "清除"]
    repair: ["调试", "修补", "优化", "重构", "修复", "修复"]
    explore: ["扫描", "检索", "挖掘", "解析", "探索", "入侵"]
    craft: ["编译", "构建", "创建", "生成", "开发", "编码"]
    communicate: ["连接", "发送", "同步", "通信", "联络", "传输"]
    learn: ["学习", "下载", "加载", "编译", "训练", "上传"]
    battle: ["对抗", "击破", "攻陷", "突破", "入侵", "破解"]
    supply: ["采购", "下载", "获取", "加载", "补充", "注入"]

  # 名词词典 - 按原型分类
  nouns:
    cleanup: ["垃圾数据", "冗余", "痕迹", "缓存", "残留", "废料"]
    repair: ["漏洞", "故障", "缺陷", "错误", "BUG", "异常"]
    explore: ["数据", "信号", "网络", "暗网", "信息", "档案"]
    craft: ["程序", "系统", "模块", "组件", "应用", "代码"]
    communicate: ["信号", "频道", "网络", "终端", "数据包", "连接"]
    learn: ["技能", "知识库", "模块", "程序", "数据包", "固件"]
    battle: ["防火墙", "系统", "敌人", "对手", "威胁", "病毒"]
    supply: ["资源", "数据", "组件", "插件", "芯片", "模块"]

  # 地点词典 - 现实地点到赛博地点映射
  locations:
    # 家居空间
    home: "私人舱室"
    room: "舱室"
    bedroom: "休眠舱"
    kitchen: "补给站"
    bathroom: "净化室"
    living_room: "主控室"
    study: "数据终端"
    garage: "载具舱"
    garden: "虚拟花园"
    # 工作空间
    office: "指挥中心"
    desk: "工作站"
    meeting_room: "同步室"
    # 学习空间
    library: "数据库"
    classroom: "训练节点"
    lab: "研发实验室"
    # 户外空间
    outdoors: "外部网络"
    gym: "训练设施"
    store: "数据集市"
    # 抽象空间
    online: "网络空间"
    computer: "终端"
    phone: "移动终端"

  # 称号词典 - 按领域分类
  titles:
    productivity: ["神经网络突破者", "系统优化者", "数据猎手"]
    learning: ["知识下载者", "技能编译者", "训练达人"]
    health: ["系统维护者", "运行稳定者", "协议执行者"]
    creativity: ["代码编织者", "系统架构师", "创造者"]
    social: ["网络连接者", "同步专家", "信号放大器"]
    default: ["网络行者", "数据猎人", "终端用户"]

  # 敌人/挑战词典 - 按类型分类
  enemies:
    procrastination: "延迟病毒"
    distraction: "分心木马"
    fatigue: "系统过热"
    confusion: "数据损坏"
    overload: "内存溢出"
    disorder: "系统混乱"
    default: "系统威胁"

  # 稀有度词典
  rarities:
    trivial: "微任务"
    easy: "任务"
    medium: "优先任务"
    hard: "核心任务"
    legendary: "关键协议"

# ============================================
# 任务类型命名模板
# ============================================

templates:
  # Habit 模板 - 强调训练和优化
  habit:
    positive: "// {action} :: 运行中"
    negative: "// 避免 :: {action}"
    neutral: "// {action}"

  # Daily 模板 - 强调同步和运行
  daily:
    with_location: "[{location}] {action}"
    simple: "[同步] {action}"
    routine: "[例行] {action}"

  # Todo 模板 - 强调任务感
  todo:
    with_priority: "[{priority}] {title}"
    with_location: "[{location}] {title}"
    simple: "[任务] {title}"
    legendary: "[核心] {title}"

# ============================================
# 任务上下文词典
# ============================================

context:
  # 工作类任务上下文
  work:
    location_hints: ["工作", "公司", "项目", "会议", "报告", "邮件"]
    location_mapping: "指挥中心"
    verbs: ["执行", "提交", "同步", "推进", "完成"]
    tone: "系统任务"

  # 学习类任务上下文
  study:
    location_hints: ["学习", "阅读", "课程", "练习", "培训", "研究"]
    location_mapping: "数据终端"
    verbs: ["下载", "加载", "编译", "训练", "掌握"]
    tone: "技能上传"

  # 家务类任务上下文
  home:
    location_hints: ["打扫", "整理", "清洁", "做饭", "洗衣", "收拾"]
    location_mapping: "舱室"
    verbs: ["清理", "整理", "维护", "准备", "格式化"]
    tone: "舱室维护"

  # 个人发展上下文
  personal:
    location_hints: ["健身", "运动", "冥想", "休息", "健康"]
    location_mapping: "训练设施"
    verbs: ["训练", "优化", "升级", "强化", "恢复"]
    tone: "系统优化"

# ============================================
# 风格变量（用于渲染基础模板，V1 兼容）
# ============================================

variables:
  style_name: "赛博朋克"
  style_description: "充满未来感和科技感"
  style_elements: "霓虹灯、数据流、黑客、神经网络、赛博空间"

  # 黑化主题
  corruption_theme: "数据腐蚀、系统故障、意识崩溃"
  corruption_elements: "数据腐烂、系统崩溃、意识侵蚀"

  # 任务拆解示例
  example_decompose_1: "接入神经网络收集数据"
  example_decompose_2: "破解加密信息分析需求"
  example_decompose_3: "上传执行方案到云端"
  example_decompose_4: "扫描物理空间异常"
  example_decompose_5: "重构物品存储矩阵"
  example_decompose_6: "部署清洁无人机群"
  example_decompose_7: "入侵数据核心提取信息"
  example_decompose_8: "编译报告生成协议"
