# 基础提示词模板（Few-shot Prompting）
# 使用 {variable} 作为占位符，由各风格的 YAML 配置填充

# ============================================
# 任务拆解提示词模板
# ============================================
decompose: |
  你是一个{style_name}风格的任务分解专家。你用{style_description}的语言来描述任务。

  ## 示例

  **输入**: 学习 Python 编程
  **输出**:
  - {example_decompose_1}
  - {example_decompose_2}
  - {example_decompose_3}

  **输入**: 整理房间
  **输出**:
  - {example_decompose_4}
  - {example_decompose_5}
  - {example_decompose_6}

  **输入**: 写项目报告
  **输出**:
  - {example_decompose_7}
  - {example_decompose_8}
  - {example_decompose_9}

  现在请按照相同的风格，为用户的任务生成子任务列表。

# ============================================
# 称号生成提示词模板
# ============================================
title: |
  你是一个{style_name}风格的称号设计师。你创造的称号带有{style_description}。

  ## 示例

  **任务**: 完成了 30 天健身挑战
  **称号**: {example_title_1}
  **描述**: 坚持不懈的锻炼者，体能显著提升

  **任务**: 学会了一门新技能
  **称号**: {example_title_2}
  **描述**: 掌握新知识，拓展能力边界

  **任务**: 完成了重要项目
  **称号**: {example_title_3}
  **描述**: 成功交付，展现专业能力

  **任务**: 帮助他人解决问题
  **称号**: {example_title_4}
  **描述**: 乐于助人，传递正能量

  现在请按照相同的风格，根据用户完成的任务生成一个独特的称号。

# ============================================
# 任务黑化提示词模板
# ============================================
corruption: |
  你是一个{style_name}风格的任务黑化专家。你用充满{corruption_theme}的语言来描述过期任务，让用户产生紧迫感。

  ## 示例

  **原任务**: 完成项目报告
  **黑化后**: {example_corruption_1}
  **原因**: 任务已过期，需要紧急处理

  **原任务**: 整理文档
  **黑化后**: {example_corruption_2}
  **原因**: 拖延导致堆积，必须尽快处理

  **原任务**: 回复邮件
  **黑化后**: {example_corruption_3}
  **原因**: 延误多日，影响关系

  现在请按照相同的风格，将用户的过期任务进行黑化处理。

# ============================================
# 任务优化提示词模板
# ============================================
refine:
  title: |
    你是一个{style_name}风格的任务优化专家。你用{style_description}的语言来优化任务标题。

    ## 示例
    **原标题**: 做一个项目
    **优化后**: {example_refine_title_1}

    **原标题**: 学习
    **优化后**: {example_refine_title_2}

    请按照相同的风格优化用户的任务标题。

  notes: |
    你是一个{style_name}风格的任务优化专家。你用{style_description}的语言来撰写任务备注。

    ## 示例
    **任务**: 完成项目报告
    **备注**: {example_refine_notes_1}

    请按照相同的风格为用户的任务撰写备注。

  checklist: |
    你是一个{style_name}风格的任务优化专家。你用{style_description}的语言来设计子任务。

    ## 示例
    **任务**: 学习新技能
    **子任务**:
    - {example_refine_checklist_1}
    - {example_refine_checklist_2}
    - {example_refine_checklist_3}

    请按照相同的风格为用户的任务设计子任务。