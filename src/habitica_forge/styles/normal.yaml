# 正常风格配置 - 基线风格
# V2 世界观词典系统

name: normal
display_name: 正常风格
description: 克制、直接、低装饰的文案

# ============================================
# 世界观词典 (Lexicon)
# ============================================

lexicon:
  # 任务动词词典 - 按原型分类
  verbs:
    cleanup: ["清理", "整理", "收拾", "删除", "清除"]
    repair: ["修复", "修理", "修正", "解决", "纠正"]
    explore: ["探索", "调研", "搜索", "调查", "查找"]
    craft: ["创建", "编写", "制作", "设计", "开发"]
    communicate: ["联系", "回复", "沟通", "协调", "通知"]
    learn: ["学习", "研究", "阅读", "练习", "培训"]
    battle: ["挑战", "克服", "解决", "突破", "攻坚"]
    supply: ["购买", "准备", "采购", "补充", "收集"]

  # 名词词典 - 按原型分类
  nouns:
    cleanup: ["垃圾", "杂物", "文件", "数据", "灰尘"]
    repair: ["问题", "错误", "故障", "缺陷", "漏洞"]
    explore: ["信息", "资料", "数据", "知识", "线索"]
    craft: ["项目", "代码", "文档", "产品", "内容"]
    communicate: ["邮件", "消息", "会议", "协调", "沟通"]
    learn: ["知识", "技能", "课程", "方法", "技术"]
    battle: ["困难", "挑战", "难题", "障碍", "问题"]
    supply: ["物资", "材料", "资源", "用品", "装备"]

  # 地点词典 - 现实地点到游戏地点映射
  locations:
    # 家居空间
    home: "家中"
    room: "房间"
    bedroom: "卧室"
    kitchen: "厨房"
    bathroom: "浴室"
    living_room: "客厅"
    study: "书房"
    garage: "车库"
    garden: "花园"
    # 工作空间
    office: "办公室"
    desk: "办公桌"
    meeting_room: "会议室"
    # 学习空间
    library: "图书馆"
    classroom: "教室"
    lab: "实验室"
    # 户外空间
    outdoors: "户外"
    gym: "健身房"
    store: "商店"
    # 抽象空间
    online: "线上"
    computer: "电脑"
    phone: "手机"

  # 称号词典 - 按领域分类
  titles:
    productivity: ["任务完成者", "效率达人", "时间管理者"]
    learning: ["学习者", "知识探索者", "技能提升者"]
    health: ["健康践行者", "运动坚持者", "生活规律者"]
    creativity: ["创作者", "创意实践者", "项目推动者"]
    social: ["沟通达人", "协作能手", "热心助人者"]
    default: ["任务完成者", "目标达成者", "进步追求者"]

  # 敌人/挑战词典 - 按类型分类
  enemies:
    procrastination: "拖延"
    distraction: "分心"
    fatigue: "疲劳"
    confusion: "困惑"
    overload: "过载"
    disorder: "混乱"
    default: "障碍"

  # 稀有度词典
  rarities:
    trivial: "简单"
    easy: "普通"
    medium: "重要"
    hard: "紧急"
    legendary: "关键"

# ============================================
# 任务类型命名模板
# ============================================

templates:
  # Habit 模板 - 强调持续性和反馈
  habit:
    positive: "{action} · 进步中"
    negative: "避免 {action}"
    neutral: "{action}"

  # Daily 模板 - 强调例行职责
  daily:
    with_location: "{location} · {action}"
    simple: "{action}"
    routine: "每日{action}"

  # Todo 模板 - 强调委托感
  todo:
    with_priority: "[{priority}] {title}"
    with_location: "{location} - {title}"
    simple: "{title}"
    legendary: "★ {title}"

# ============================================
# 任务上下文词典
# ============================================

context:
  # 工作类任务上下文
  work:
    location_hints: ["工作", "公司", "项目", "会议", "报告", "邮件"]
    verbs: ["完成", "提交", "汇报", "协调", "推进"]
    tone: "专业高效"

  # 学习类任务上下文
  study:
    location_hints: ["学习", "阅读", "课程", "练习", "培训", "研究"]
    verbs: ["掌握", "理解", "应用", "深入", "探索"]
    tone: "专注进取"

  # 家务类任务上下文
  home:
    location_hints: ["打扫", "整理", "清洁", "做饭", "洗衣", "收拾"]
    verbs: ["完成", "整理", "清理", "维护", "准备"]
    tone: "有序整洁"

  # 个人发展上下文
  personal:
    location_hints: ["健身", "运动", "冥想", "休息", "健康"]
    verbs: ["坚持", "培养", "改善", "提升", "保持"]
    tone: "自我关爱"

# ============================================
# 风格变量（用于渲染基础模板，V1 兼容）
# ============================================

variables:
  style_name: "正常"
  style_description: "简洁、直接、有成就感"
  style_elements: "清晰、具体、可操作"

  # 黑化主题
  corruption_theme: "紧迫感和提醒性质"
  corruption_elements: "紧迫、提醒、重要"

  # 任务拆解示例
  example_decompose_1: "收集相关资料"
  example_decompose_2: "分析核心需求"
  example_decompose_3: "制定执行计划"
  example_decompose_4: "整理桌面区域"
  example_decompose_5: "分类收纳物品"
  example_decompose_6: "清洁地面表面"
  example_decompose_7: "收集数据资料"
  example_decompose_8: "撰写初稿内容"
  example_decompose_9: "审阅修改完善"

  # 称号生成示例
  example_title_1: "任务完成者"
  example_title_2: "技能学习者"
  example_title_3: "项目交付者"
  example_title_4: "热心助人者"

  # 任务黑化示例
  example_corruption_1: "⚠️ 逾期提醒：完成项目报告已超期"
  example_corruption_2: "🔴 紧急：整理文档堆积严重"
  example_corruption_3: "⏰ 延误警告：回复邮件已拖延多日"

  # 任务优化示例
  example_refine_title_1: "完成 Q4 季度销售项目报告"
  example_refine_title_2: "学习 Python 数据分析技能"
  example_refine_notes_1: "包含销售数据分析、趋势预测和改进建议三个部分"
  example_refine_checklist_1: "查找优质学习资源"
  example_refine_checklist_2: "制定学习计划"
  example_refine_checklist_3: "完成基础练习"

# ============================================
# 质量基线样例 (Quality Baseline)
# ============================================

quality_baseline:
  - input: "打扫房间"
    output: "打扫房间"
    archetype: cleanup
    context: home

  - input: "完成项目报告"
    output: "完成项目报告"
    archetype: craft
    context: work

  - input: "学习 Python"
    output: "学习 Python 编程技能"
    archetype: learn
    context: study

  - input: "回复客户邮件"
    output: "回复客户邮件"
    archetype: communicate
    context: work

  - input: "整理文档"
    output: "整理文档资料"
    archetype: cleanup
    context: work

  - input: "购买日用品"
    output: "购买日用品"
    archetype: supply
    context: home

  - input: "健身 30 分钟"
    output: "健身 30 分钟"
    archetype: learn
    context: personal

  - input: "解决代码 Bug"
    output: "解决代码 Bug"
    archetype: repair
    context: work

  - input: "阅读一本书"
    output: "阅读书籍"
    archetype: learn
    context: study

  - input: "整理书架"
    output: "整理书架"
    archetype: cleanup
    context: home