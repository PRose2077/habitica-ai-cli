# ============================================
# 任务类型命名模板
# ============================================

templates:
  # Habit 模板 - 强调修炼和坚持
  habit:
    positive: "【修炼】{action}"
    negative: "【克制】避免{action}"
    neutral: "【习惯】{action}"

  # Daily 模板 - 强调日常修行
  daily:
    with_location: "【{location}】{action}"
    simple: "【日课】{action}"
    routine: "【例行】{action}"

  # Todo 模板 - 强调事务感
  todo:
    with_priority: "【{priority}】{title}"
    with_location: "【{location}】{title}"
    simple: "【事务】{title}"
    legendary: "【大业】{title}"

# ============================================
# 任务上下文词典
# ============================================

context:
  # 工作类任务上下文
  work:
    location_hints: ["工作", "公司", "项目", "会议", "报告", "邮件"]
    location_mapping: "门派"
    verbs: ["完成", "禀报", "协调", "推进", "交付"]
    tone: "门派事务"

  # 学习类任务上下文
  study:
    location_hints: ["学习", "阅读", "课程", "练习", "培训", "研究"]
    location_mapping: "藏经阁"
    verbs: ["修炼", "参悟", "研习", "领悟", "掌握"]
    tone: "武学修习"

  # 家务类任务上下文
  home:
    location_hints: ["打扫", "整理", "清洁", "做饭", "洗衣", "收拾"]
    location_mapping: "宅邸"
    verbs: ["清理", "整理", "维护", "准备", "涤荡"]
    tone: "宅邸维护"

  # 个人发展上下文
  personal:
    location_hints: ["健身", "运动", "冥想", "休息", "健康"]
    location_mapping: "演武场"
    verbs: ["修炼", "强化", "提升", "锻炼", "恢复"]
    tone: "身心修炼"

