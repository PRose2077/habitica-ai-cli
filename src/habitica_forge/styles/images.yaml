# 图片资源词典
#
# 设计约束：
# 1. AI 侧只读取 title / description 等语义信息，不直接读取 url。
# 2. 程序在最终渲染 markdown 图片时，根据 image_id 查表注入 url。
# 3. 图片资源建议保持小尺寸、稳定链接、明确版权来源。
#
# V2 新增：
# - 按风格分类 (styles)
# - 按任务原型分类 (archetypes)
# - 按用途分类 (usage)
# - 支持白名单控制

# ============================================
# 图片资源配置
# ============================================

defaults:
  # 默认图片尺寸约束
  max_width: 200
  max_height: 200
  # 默认启用状态
  enabled: true

# ============================================
# 通用图片资源
# ============================================

common:
  - id: forge-scroll
    title: 委托卷轴
    description: 适合任务委托、传奇任务、任务详情页头部展示的卷轴图标
    url: https://example.com/images/forge-scroll.png
    enabled: true
    usage:
      - quest_header
      - legendary_task

  - id: campfire
    title: 营地篝火
    description: 适合日常整理、休整、家务类任务的温和场景图标
    url: https://example.com/images/campfire.png
    enabled: true
    usage:
      - daily_task
      - home_context

  - id: check-mark
    title: 完成标记
    description: 任务完成时的标记图标
    url: https://example.com/images/check-mark.png
    enabled: true
    usage:
      - completion
      - success

  - id: star-badge
    title: 星章
    description: 成就、称号、奖励类展示图标
    url: https://example.com/images/star-badge.png
    enabled: true
    usage:
      - achievement
      - title

