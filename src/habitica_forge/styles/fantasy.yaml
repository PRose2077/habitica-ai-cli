  example_corruption_3: "打破沉默的魔咒 - 邮件联络通道已被封印"

  # 任务优化示例
  example_refine_title_1: "完成 Q4 季度销售王国报告"
  example_refine_title_2: "学习 Python 数据分析魔法"
